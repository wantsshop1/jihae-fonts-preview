<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>몽블랑 각인 미리보기</title>

<!-- 웹폰트 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>
@font-face {
font-family: 'Chosun';
src: url('./ChosunCentennial_ttf.ttf');
}

@font-face {
font-family: 'Kkubulim';
src: url('./BMKkubulimTTF.ttf');
}

@font-face {
font-family: 'Jalnan';
src: url('./Jalnan2TTF.ttf');
}

@font-face {
font-family: 'Binggrae';
src: url('./Binggrae2-Bold.ttf');
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Pretendard',sans-serif;
background:#f5f6f8;
padding:60px 20px;
color:#222;
}


.wrap{
width:100%;
max-width:980px;
margin:auto;
background:#fff;
border-radius:28px;
padding:50px;
box-shadow:0 15px 50px rgba(0,0,0,.08);
}


h1{
text-align:center;
font-size:32px;
margin-bottom:30px;
}

input{
width:100%;
height:68px;
border:1px solid #ddd;
border-radius:16px;
padding:0 24px;
font-size:19px;
transition:.25s;
}




input:focus{
    border-color:#111111;
}

.font-buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
margin:40px 0 50px;
}

.font-btn{
height:90px;
border:1px solid #ddd;
border-radius:18px;
background:#fff;
transition:.25s;
cursor:pointer;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.font-btn:hover{
transform:translateY(-3px);
border-color:#111;
}

.font-btn.active{
border:2px solid #111;
background:#111;
color:#fff;
}



.preview-box{
min-height:330px;
background:#fafafa;
border:1px solid #e6e6e6;
border-radius:24px;
display:flex;
justify-content:center;
align-items:center;
}

#preview{
font-size:64px;
transition:.25s;
}

h1{
    font-size:40px;
    font-weight:800;
    text-align:center;
    margin-bottom:40px;
    letter-spacing:-1px;
}

h1 span{
display:block;
margin-top:10px;
font-size:15px;
font-weight:400;
color:#888;
letter-spacing:0;
}

/* 휴대폰 */

@media(max-width:768px){

    


.jalnan strong{
    font-size:16px;
}

}
.wrap{
padding:20px;
}

h1{
    font-size:35px;
    font-weight:800;
    text-align:center;
    margin-bottom:35px;
}

.notice{
    padding:18px 22px;
    margin-bottom:25px;
}


.font-buttons{
grid-template-columns:repeat(2,1fr);
}

.font-btn{
    height:80px;
    padding:10px;
}

.font-btn strong{
    font-size:16px;
}

.font-btn small{
    font-size:11px;
    margin-top:4px;
}

#preview{
font-size:36px;
}

.preview-box{
min-height:180px;
}

}
.notice{
    width:100%;
    background:#f8f8f8;
    border:1px solid #e6e6e6;
    border-radius:10px;
    padding:14px 18px;
    margin:20px 0 25px;
}

.notice p{
    margin:4px 0;
    font-size:13px;
    color:#666;
    line-height:1.6;
}
.font-btn strong{
    font-size:22px;
    font-weight:600;
    line-height:1.2;
}

.font-btn small{
    margin-top:8px;
    font-size:13px;
    font-family:'Pretendard',sans-serif;
    color:#888;
}

.font-btn.active small{
    color:#ddd;
}
/* ===========================
   각인 예시
=========================== */

.example-section{
    margin-top:70px;
}

.example-section h2{
    text-align:center;
    font-size:28px;
    font-weight:700;
    margin-bottom:30px;
    color:#222;
}

.example-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
}

.example-grid img{
    width:100%;
    display:block;
    border-radius:16px;
    border:1px solid #e6e6e6;
    transition:.3s;
}

.example-grid img:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 25px rgba(0,0,0,.08);
}
</style>

</head>
<body>

<div class="wrap">

<h1> 🔍몽블랑 각인 미리보기 Preview </h1>
<div class="notice">
    <p>※ 특수문자 및 너무 긴 문장, 2줄 이상은 각인이 불가합니다.</p>
    <p>※ 문구는 최대 15자이내로 가능합니다.</p>
    <p>※ 폰트 선택에 참고용으로 보는 미리보기입니다.</p>
    <p>※ 실제 각인 시안의 글자는 길이나 폭이 미세하게 달라질 수 있습니다.</p>
    <p>※ 영어로 작성 시 대소문자 섞는 걸 추천드립니다.</p>

</div>


<input
id="textInput"
type="text"
placeholder="각인할 문구를 입력하세요."
maxlength="20">

<div class="font-buttons">

<button class="font-btn active" data-font="Chosun" style="font-family:'Chosun';">
    <strong>조선 궁서체</strong>
    <small>Classic Serif</small>
</button>

<button class="font-btn" data-font="Kkubulim" style="font-family:'Kkubulim';">
    <strong>꾸불림체</strong>
    <small>BM Kkubulim</small>
</button>

<button class="font-btn jalnan" data-font="Jalnan" style="font-family:'Jalnan';">
    <strong>여기어때체</strong>
    <small>Jalnan</small>
</button>

<button class="font-btn" data-font="Binggrae" style="font-family:'Binggrae';">
    <strong>빙그레체</strong>
    <small>Binggrae Bold</small>
</button>

</div>

<div class="preview-box">

<div id="preview">
각인 문구 미리보기
</div>

</div>

<div class="example-section">

    <h2>🔹각인 예시🔹</h2>

    <div class="example-grid">
       <img src="./example1.jpg" alt="example1.jpg">
<img src="./example2.jpg" alt="example2.jpg">
    </div>

</div>

<script>

const input=document.getElementById("textInput");
const preview=document.getElementById("preview");
const buttons=document.querySelectorAll(".font-btn");

input.addEventListener("input",()=>{

preview.textContent=input.value || "각인 문구";

});

buttons.forEach(btn=>{

btn.addEventListener("click",()=>{

buttons.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

preview.style.fontFamily=btn.dataset.font;

});

});

</script>

</body>
</html>
